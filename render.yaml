services:
  - type: web
    name: stock-viewer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FINMIND_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
    autoDeploy: true
